version: '3.8'

services:
  # Valkey (Redis 兼容缓存)
  valkey:
    image: valkey/valkey:8-alpine
    container_name: rust-web-app-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    command: valkey-server --appendonly yes
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgreSQL 数据库
  postgres:
    image: postgres:17
    container_name: rust-web-app-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev_only_pwd
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Web 服务器
  web-server:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: rust-web-app-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # 日志级别
      RUST_LOG: "web_server=debug,lib_core=debug,lib_web=debug,lib_auth=debug,lib_utils=debug"
      # 数据库连接
      SERVICE_DB_URL: postgres://app_user:dev_only_pwd@postgres:5432/app_db
      # 开发初始化数据库连接 (Docker 环境使用服务名)
      # DEV_POSTGRES_URL: postgres://postgres:dev_only_pwd@postgres:5432/postgres
      # DEV_APP_URL: postgres://app_user:dev_only_pwd@postgres:5432/app_db
      # Web 静态文件目录
      SERVICE_WEB_FOLDER: /app/web-folder
      # 密码加密密钥 (base64url 编码，仅用于开发)
      SERVICE_PWD_KEY: "SWFtQVZlcnlTZWNyZXRQd2RLZXlGb3JEZXY"
      # Token 密钥 (base64url 编码，仅用于开发)
      SERVICE_TOKEN_KEY: "SWFtQVZlcnlTZWNyZXRUb2tlbktleUZvckRldg"
      # Token 有效期（秒）
      SERVICE_TOKEN_DURATION_SEC: "86400"
      # Valkey 连接配置
      SERVICE_VALKEY_URL: redis://valkey:6379
      SERVICE_VALKEY_POOL_MAX_SIZE: "10"
      SERVICE_VALKEY_POOL_MIN_IDLE: "2"
      # 权限缓存开关
      SERVICE_PERMISSION_CACHE_ENABLED: "true"
    volumes:
      - ./web-folder:/app/web-folder:ro
      - ./sql:/app/sql:ro

volumes:
  postgres_data:
  valkey_data:
