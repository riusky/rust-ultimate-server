version: '3.8'

services:
  # Valkey (Redis 兼容缓存)
  valkey:
    image: valkey/valkey:8-alpine
    container_name: rust-web-app-valkey
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    command: valkey-server --appendonly yes
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgreSQL 数据库
  postgres:
    image: postgres:17
    container_name: rust-web-app-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: dev_only_pwd
      POSTGRES_DB: app_db
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Web 服务器 (Rust + Axum)
  web-server:
    build:
      context: .
      dockerfile: Dockerfile.app
      pull: false
    container_name: rust-web-app-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    # 生产环境通过网关访问，不直接暴露
    # ports:
    #   - "8080:8080"
    expose:
      - "8080"
    environment:
      RUST_LOG: "web_server=debug,lib_core=debug,lib_web=debug,lib_auth=debug,lib_utils=debug"
      SERVICE_DB_URL: postgres://app_user:dev_only_pwd@postgres:5432/app_db
      SERVICE_WEB_FOLDER: /app/web-folder
      SERVICE_PWD_KEY: "SWFtQVZlcnlTZWNyZXRQd2RLZXlGb3JEZXY"
      SERVICE_TOKEN_KEY: "SWFtQVZlcnlTZWNyZXRUb2tlbktleUZvckRldg"
      SERVICE_TOKEN_DURATION_SEC: "86400"
      SERVICE_VALKEY_URL: redis://valkey:6379
      SERVICE_VALKEY_POOL_MAX_SIZE: "10"
      SERVICE_VALKEY_POOL_MIN_IDLE: "2"
      SERVICE_PERMISSION_CACHE_ENABLED: "true"
      # Initial admin: set password for user (default demo1) only when user has no password yet
      INIT_ADMIN_USERNAME: "demo1"
      INIT_ADMIN_PASSWORD: "changeme"
    volumes:
      - ./sql:/app/sql:ro

  # 前端 (Vue 3 + Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rust-web-app-frontend
    restart: unless-stopped
    expose:
      - "80"

  # Pingora 网关 (统一入口)
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
      pull: false
    container_name: rust-web-app-gateway
    restart: unless-stopped
    depends_on:
      - web-server
      - frontend
    ports:
      - "80:80"
    environment:
      RUST_LOG: "info"
      UPSTREAM_API_ADDR: web-server
      UPSTREAM_API_PORT: "8080"
      UPSTREAM_FRONTEND_ADDR: frontend
      UPSTREAM_FRONTEND_PORT: "80"
      GATEWAY_LISTEN_PORT: "80"

volumes:
  postgres_data:
  valkey_data:
