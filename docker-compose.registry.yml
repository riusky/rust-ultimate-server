# Private Docker Registry for application images.
# Requires rust-app-network (deploy infra stack first).
# Komodo Build pushes here; app stack pulls from here.

networks:
  app-network:
    name: rust-app-network
    external: true

services:
  registry:
    image: registry:2
    container_name: rust-web-app-registry
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "5000:5000"
    volumes:
      - registry_data:/var/lib/registry

volumes:
  registry_data:
