# Infrastructure stack: PostgreSQL + Valkey
# Creates shared network rust-app-network for cross-stack communication.
# Deploy this stack first (Komodo: infra).

networks:
  app-network:
    name: rust-app-network
    driver: bridge

services:
  valkey:
    image: valkey/valkey:8-alpine
    container_name: rust-web-app-valkey
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - valkey_data:/data
    command: valkey-server --appendonly yes
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:17
    container_name: rust-web-app-db
    restart: unless-stopped
    networks:
      - app-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  valkey_data:
