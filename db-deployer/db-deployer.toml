# Database Deployer Configuration
# Copy this file to db-deployer.toml and modify as needed

[database]
host = "localhost"
port = 5432
user = "postgres"
password = "dev_only_pwd"
name_prefix = "app_db"
admin_db = "postgres"

[paths]
init_sql_dir = "sql/init"
updates_sql_dir = "sql/updates"
records_dir = "db-upgrade"

[keys]
private_key = "keys/private.pem"
public_key = "keys/public.pem"

[git]
auto_commit = true
auto_push = true
commit_prefix = "chore(db)"

[deploy]
retain_versions = 3
require_confirmation = true

# ============================================================
# 项目部署配置（完整部署流程需要）
# ============================================================
[project]
# 项目 Git 仓库地址
repo_url = "git@github.com:riusky/cmx-server.git"

# 部署分支
branch = "main"

# 项目存放目录（克隆/更新位置）
project_dir = "D:\\devlopment"

# Docker Compose 文件路径（相对于 project_dir）
docker_compose_file = "docker-compose.yml"

# SQL 源目录（相对于 project_dir）
sql_source_dir = "sql"

# docker-compose 中的服务名
service_name = "web-server"

# 数据库连接环境变量名
db_url_env_name = "SERVICE_DB_URL"
